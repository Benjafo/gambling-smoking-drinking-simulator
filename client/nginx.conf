server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # rapier3d-compat ships a .wasm asset the sim worker fetches at runtime;
    # scoped to this extension so it doesn't clobber the default mime.types map.
    location ~ \.wasm$ {
        types { application/wasm wasm; }
        try_files $uri =404;
    }
}
