server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # multiplayer websocket rides the same origin so the page can dial
    # wss://<host>/ws behind TLS instead of exposing the lobby port
    location /ws {
        proxy_pass http://server:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # idle browsing sockets outlive the 60s default
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # rapier3d-compat ships a .wasm asset the sim worker fetches at runtime;
    # scoped to this extension so it doesn't clobber the default mime.types map.
    location ~ \.wasm$ {
        types { application/wasm wasm; }
        try_files $uri =404;
    }
}
