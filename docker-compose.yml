services:
  # prod: traefik terminates TLS and routes the subdomain to the client's
  # nginx, which serves the static build and proxies /ws to the lobby
  # server over the internal network — nothing publishes a host port.
  server:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - PORT=8081
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8081/healthz').then(r=>process.exit(r.ok?0:1),()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blackjack.rule=Host(`blackjack.benjafo.com`)"
      - "traefik.http.routers.blackjack.entrypoints=websecure"
      - "traefik.http.routers.blackjack.tls.certresolver=letsencrypt"
      - "traefik.http.services.blackjack.loadbalancer.server.port=80"
      - "traefik.docker.network=web"
    restart: unless-stopped

  server-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: server/Dockerfile
    command: npm --workspace server run dev
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    networks:
      - internal

  client-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: client/Dockerfile
      target: deps
    command: npm --workspace client run dev -- --host
    ports:
      - "5173:5173"
    # If file changes aren't picked up (older Docker Desktop / some VM mounts
    # don't forward inotify events), uncomment to fall back to polling:
    environment:
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    networks:
      - internal

networks:
  # traefik's network, created by the traefik stack: docker network create web
  web:
    external: true
  internal:
